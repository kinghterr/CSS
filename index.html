<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animation Workshop</title>
    <style>
        /* ОСНОВНОЙ ДИЗАЙН */
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 100px;
        }

        /* Задание 13: Прелоадер */
        .preloader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeOut 0.5s forwards 2.5s; /* Исчезает через 2.5 сек */
        }

        /* Задание 6: Loader (Крутящийся круг) */
        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(56, 189, 248, 0.2);
            border-top: 5px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        /* Задание 8: Меню с underline-анимацией */
        nav {
            margin-top: 50px;
            display: flex;
            gap: 30px;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text);
            position: relative;
            padding: 5px 0;
            transition: color 0.3s; /* Задание 1: изменение цвета */
        }

        .nav-link:hover {
            color: var(--accent);
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width 0.3s ease; /* Задание 8: плавное подчеркивание */
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* Задание 12: Параллакс (упрощенный через background-attachment) */
        .hero {
            width: 100%;
            height: 400px;
            margin-top: 50px;
            background-image: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&q=80&w=1200');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Задание 5: Пульсирующая кнопка */
        .pulse-btn {
            padding: 15px 30px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: var(--bg);
            font-weight: bold;
            cursor: pointer;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(56, 189, 248, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); }
        }

        /* КОНТЕЙНЕР ДЛЯ КАРТОЧЕК */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 300px);
            gap: 20px;
            margin-top: 50px;
        }

        /* Задание 2: Увеличение блока и Задание 7: Анимация появления */
        .card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            padding: 20px;
            transition: transform 0.3s ease;
            animation: slideUp 0.8s ease backwards; /* Появление снизу */
        }

        .card:hover {
            transform: scale(1.05); /* Увеличение */
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Задание 14: Hover-эффекты для фото */
        .img-box {
            width: 100%;
            height: 150px;
            background: #334155;
            border-radius: 8px;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
        }

        .img-box img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.5s, filter 0.5s;
        }

        .card:hover .img-box img {
            transform: scale(1.2); /* Зум */
            filter: brightness(0.4); /* Затемнение */
        }

        /* Задание 3: Появление текста */
        .hover-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            color: white;
            font-weight: bold;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .card:hover .hover-text {
            opacity: 1;
        }

        /* Задание 4: Двигающийся квадрат */
        .track {
            width: 100%;
            height: 4px;
            background: #334155;
            margin: 20px 0;
            position: relative;
        }

        .moving-box {
            width: 20px; height: 20px;
            background: var(--accent);
            position: absolute;
            top: -8px;
            animation: moveRight 3s infinite alternate ease-in-out;
        }

        @keyframes moveRight {
            from { left: 0; }
            to { left: calc(100% - 20px); }
        }

        /* Задание 9: Ripple Button (упрощенно через CSS) */
        .ripple-btn {
            position: relative;
            overflow: hidden;
            background: #475569;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        .ripple-btn::after {
            content: "";
            background: rgba(255, 255, 255, 0.3);
            display: block;
            position: absolute;
            border-radius: 50%;
            left: 0; right: 0; top: 0; bottom: 0;
            width: 100px; height: 100px;
            margin: auto;
            opacity: 0;
            transition: all 0.6s;
            transform: scale(1);
        }

        .ripple-btn:active::after {
            transform: scale(4);
            opacity: 1;
            transition: 0s;
        }

        /* Задание 11: Бургер-меню (CSS анимация) */
        .burger {
            width: 30px; height: 20px;
            display: flex; flex-direction: column; justify-content: space-between;
            cursor: pointer; margin-top: 50px;
        }
        .line { width: 100%; height: 3px; background: white; transition: 0.3s; }
        
        .burger:hover .line:nth-child(1) { transform: translateY(8.5px) rotate(45deg); }
        .burger:hover .line:nth-child(2) { opacity: 0; }
        .burger:hover .line:nth-child(3) { transform: translateY(-8.5px) rotate(-45deg); }

    </style>
</head>
<body>

    <div class="preloader">
        <div class="loader"></div> </div>

    <nav>
        <a href="#" class="nav-link">Главная</a>
        <a href="#" class="nav-link">Проекты</a>
        <a href="#" class="nav-link">Контакты</a>
    </nav>

    <div class="burger">
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
    </div>

    <div class="hero">
        <button class="pulse-btn">ПУЛЬСИРУЮЩАЯ КНОПКА (№5)</button>
    </div>

    <div class="grid">
        <div class="card" style="animation-delay: 0.1s;">
            <div class="img-box">
                <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=400" alt="CSS">
                <div class="hover-text">СМОТРЕТЬ (№3)</div> </div>
            <h3>Hover Effect (№2 & 14)</h3>
            <p>Наведи на меня, чтобы увидеть увеличение и затемнение картинки.</p>
            <div class="track">
                <div class="moving-box"></div> </div>
            <button class="ripple-btn">RIPPLE EFFECT (№9)</button>
        </div>

        <div class="card" style="animation-delay: 0.3s;">
            <div class="img-box">
                <img src="https://images.unsplash.com/photo-1633356122544-f134324a6cee?q=80&w=400" alt="JS">
                <div class="hover-text">ПОДРОБНЕЕ</div>
            </div>
            <h3>Transition (№1)</h3>
            <p>Плавные переходы делают интерфейс живым и приятным.</p>
            <button class="ripple-btn">КЛИКНИ МЕНЯ</button>
        </div>

        <div class="card" style="animation-delay: 0.5s;">
            <div class="img-box">
                <img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c?q=80&w=400" alt="Code">
                <div class="hover-text">ОТКРЫТЬ</div>
            </div>
            <h3>Keyframes (№4)</h3>
            <p>Выше ты видишь квадрат, который двигается сам по себе.</p>
            <button class="ripple-btn">ГОТОВО</button>
        </div>
    </div>

</body>
</html>
